<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Sitewright</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg: #0B2545;
--bg-deep: #081B33;
--ink: #EAF2FA;
--ink-dim: #9fb4cc;
--cyan: #8ECAE6;
--amber: #F2A541;
--line: rgba(142,202,230,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:var(--bg);color:var(--ink);font-family:'JetBrains Mono',monospace;
min-height:100vh;display:flex;align-items:center;justify-content:center;
padding:24px;text-align:center;
}
.card{max-width:480px;}
.mark{
width:14px;height:14px;background:var(--amber);
clip-path:polygon(0 0,100% 0,100% 100%);
margin:0 auto 24px;
}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,5vw,2.4rem);font-weight:700;margin-bottom:16px;}
h1 .accent{color:var(--amber);}
p{color:var(--ink-dim);line-height:1.7;font-size:0.95rem;margin-bottom:32px;}
.btn{
display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:3px;
font-weight:700;font-size:0.86rem;background:var(--amber);color:var(--bg-deep);
text-decoration:none;font-family:'JetBrains Mono',monospace;
}
.back{display:block;margin-top:20px;color:var(--cyan);font-size:0.82rem;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
<div class="mark"></div>
<h1>Thanks! <span class="accent">Request received.</span></h1>
<p>We've got your details and will follow up within a few hours. For the fastest response, message us directly on WhatsApp.</p>
<a href="https://wa.me/2348039725496?text=Hi%20Sitewright%2C%20following%20up%20on%20my%20quote%20request" class="btn" target="_blank" rel="noopener">Chat on WhatsApp</a>
<a href="/" class="back">← Back to homepage</a>
</div>
</body>
</html>
